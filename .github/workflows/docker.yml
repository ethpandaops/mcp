name: Build Check

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.goreleaser.yaml'
      - 'goreleaser.*.Dockerfile'
      - 'sandbox/Dockerfile'
  push:
    branches: [master]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.goreleaser.yaml'
      - 'goreleaser.*.Dockerfile'
      - 'sandbox/Dockerfile'

concurrency:
  group: build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: GoReleaser dry-run
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --skip=publish --clean
        env:
          LATEST_TAG: latest

  build-sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sandbox image
        run: docker build -f sandbox/Dockerfile .

  server-docker-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build server binary
        run: |
          mkdir -p linux/amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o linux/amd64/panda-server ./cmd/server

      - name: Build server image
        run: docker build -f goreleaser.server.Dockerfile -t panda-server-smoke .

      - name: Verify Docker socket access from server container
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            --group-add "$(stat -c '%g' /var/run/docker.sock)" \
            panda-server-smoke \
            docker info --format '{{.ServerVersion}}'
